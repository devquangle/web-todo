<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ДђДѓng KГЅ - Fashion Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/user.css" />
  </head>
  <body
    class="bg-slate-50 text-slate-800 flex flex-col min-h-screen font-['Inter']"
  >
    <!-- Navbar Placeholder -->
    <nav
      id="navbar-placeholder"
      class="bg-slate-900/95 text-white sticky top-0 z-50 backdrop-blur-md border-b border-slate-800 shadow-lg"
    >
      <!-- SбєЅ Д‘Ж°б»Јc tбєЈi Д‘б»™ng bбє±ng main.js -->
    </nav>
    <div
      class="container min-h-screen flex justify-center items-center px-4 py-12 mx-auto"
    >
      <div
        class="w-full max-w-md bg-white rounded-3xl border border-slate-200/60 shadow-xl overflow-hidden p-6 sm:p-8 space-y-6"
      >
        <div class="text-center space-y-2">
          <a
            href="../../index.html"
            class="text-2xl font-black tracking-wider text-amber-500 inline-block"
            >рџ‘џ FASHION SHOP</a
          >
          <h2
            class="text-xl sm:text-2xl font-extrabold text-slate-900 tracking-tight"
          >
            TбєЎo TГ i KhoбєЈn Mб»›i
          </h2>
        </div>

        <form id="form-register" class="space-y-4">
          <!-- Full Name -->
          <div>
            <label
              for="fullName"
              class="block text-[10px] font-bold text-slate-400 uppercase mb-1.5"
              >Hб»Ќ vГ  tГЄn</label
            >
            <input
              type="text"
              id="fullName"
              placeholder="Nhбє­p hб»Ќ tГЄn cб»§a bбєЎn"
              class="w-full bg-slate-50 border border-slate-200 text-xs text-slate-800 rounded-xl px-4 py-3 focus:outline-none focus:bg-white focus:border-amber-400 transition"
            />
            <span
              id="nameError"
              class="text-[10px] text-red-500 mt-1 block font-medium"
            ></span>
          </div>

          <!-- Email -->
          <div>
            <label
              for="email"
              class="block text-[10px] font-bold text-slate-400 uppercase mb-1.5"
              >Дђб»‹a chб»‰ Email</label
            >
            <input
              type="email"
              id="email"
              placeholder="name@example.com"
              class="w-full bg-slate-50 border border-slate-200 text-xs text-slate-800 rounded-xl px-4 py-3 focus:outline-none focus:bg-white focus:border-amber-400 transition"
            />
            <span
              id="emailError"
              class="text-[10px] text-red-500 mt-1 block font-medium"
            ></span>
          </div>

          <!-- Password -->
          <div>
            <label
              for="password"
              class="block text-[10px] font-bold text-slate-400 uppercase mb-1.5"
              >Mбє­t khбє©u</label
            >
            <div class="relative">
              <input
                type="password"
                id="password"
                autocomplete="new-password"
                placeholder="Tб»‘i thiб»ѓu 6 kГЅ tб»±"
                class="w-full bg-slate-50 border border-slate-200 text-xs text-slate-800 rounded-xl pl-4 pr-11 py-3 focus:outline-none focus:bg-white focus:border-amber-400 transition"
              />
              <button
                type="button"
                data-password-toggle
                aria-controls="password"
                aria-label="Hiб»‡n mбє­t khбє©u"
                class="absolute right-3 top-1/2 -translate-y-1/2 p-1 text-slate-400 hover:text-slate-600 transition"
              >
                <i class="ri-eye-line text-lg"></i>
              </button>
            </div>
            <span
              id="passwordError"
              class="text-[10px] text-red-500 mt-1 block font-medium"
            ></span>
          </div>

          <!-- Confirm Password -->
          <div>
            <label
              for="confirmPassword"
              class="block text-[10px] font-bold text-slate-400 uppercase mb-1.5"
              >XГЎc nhбє­n mбє­t khбє©u</label
            >
            <div class="relative">
              <input
                type="password"
                id="confirmPassword"
                autocomplete="new-password"
                placeholder="Nhбє­p lбєЎi mбє­t khбє©u"
                class="w-full bg-slate-50 border border-slate-200 text-xs text-slate-800 rounded-xl pl-4 pr-11 py-3 focus:outline-none focus:bg-white focus:border-amber-400 transition"
              />
              <button
                type="button"
                data-password-toggle
                aria-controls="confirmPassword"
                aria-label="Hiб»‡n mбє­t khбє©u"
                class="absolute right-3 top-1/2 -translate-y-1/2 p-1 text-slate-400 hover:text-slate-600 transition"
              >
                <i class="ri-eye-line text-lg"></i>
              </button>
            </div>
            <span
              id="confirmError"
              class="text-[10px] text-red-500 mt-1 block font-medium"
            ></span>
          </div>

          <span
            id="termsError"
            class="text-[10px] text-red-500 block font-medium"
          ></span>

          <!-- Submit Button -->
          <button
            type="submit"
            class="w-full bg-slate-900 hover:bg-slate-800 text-white text-xs font-bold py-3.5 rounded-xl shadow-md hover:-translate-y-0.5 transition duration-300"
          >
            ДђДѓng KГЅ
          </button>

          <!-- Status Alert Box -->
          <div
            id="statusBox"
            class="hidden text-xs rounded-xl p-3 text-center font-bold"
          ></div>
        </form>

        <div
          class="text-center text-xs text-slate-500 border-t border-slate-100 pt-4"
        >
          ДђГЈ cГі tГ i khoбєЈn?
          <a
            href="./login.html"
            class="text-amber-500 hover:text-amber-600 font-bold transition"
            >ДђДѓng nhбє­p ngay</a
          >
        </div>
      </div>
    </div>

    <div id="footer-placeholder"></div>

    <script>
      const formRegister = document.getElementById("form-register");
      const nameInput = document.getElementById("fullName");
      const emailInput = document.getElementById("email");
      const passwordInput = document.getElementById("password");
      const confirmInput = document.getElementById("confirmPassword");
      const termsInput = document.getElementById("terms");
      const statusBox = document.getElementById("statusBox");

      const nameError = document.getElementById("nameError");
      const emailError = document.getElementById("emailError");
      const passwordError = document.getElementById("passwordError");
      const confirmError = document.getElementById("confirmError");
      const termsError = document.getElementById("termsError");

      const clearErrors = () => {
        nameError.textContent = "";
        emailError.textContent = "";
        passwordError.textContent = "";
        confirmError.textContent = "";
        termsError.textContent = "";
        statusBox.className = "hidden";
      };

      formRegister.addEventListener("submit", function (e) {
        e.preventDefault();
        clearErrors();

        let isValid = true;
        const name = nameInput.value.trim();
        const email = emailInput.value.trim();
        const password = passwordInput.value.trim();
        const confirm = confirmInput.value.trim();
        const terms = termsInput.checked;

        // Name Validation
        if (!name) {
          nameError.textContent = "Hб»Ќ vГ  tГЄn khГґng Д‘Ж°б»Јc Д‘б»ѓ trб»‘ng.";
          isValid = false;
        }

        // Email Validation
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!email) {
          emailError.textContent = "Email khГґng Д‘Ж°б»Јc Д‘б»ѓ trб»‘ng.";
          isValid = false;
        } else if (!emailRegex.test(email)) {
          emailError.textContent = "Дђб»‹nh dбєЎng email khГґng hб»Јp lб»‡.";
          isValid = false;
        }

        // Password Validation
        if (!password) {
          passwordError.textContent = "Mбє­t khбє©u khГґng Д‘Ж°б»Јc Д‘б»ѓ trб»‘ng.";
          isValid = false;
        } else if (password.length < 6) {
          passwordError.textContent = "Mбє­t khбє©u phбєЈi chб»©a Г­t nhбєҐt 6 kГЅ tб»±.";
          isValid = false;
        }

        // Confirm Password Validation
        if (!confirm) {
          confirmError.textContent = "XГЎc nhбє­n mбє­t khбє©u khГґng Д‘Ж°б»Јc Д‘б»ѓ trб»‘ng.";
          isValid = false;
        } else if (password !== confirm) {
          confirmError.textContent = "Mбє­t khбє©u xГЎc nhбє­n khГґng trГ№ng khб»›p.";
          isValid = false;
        }

        // Terms Validation
        if (!terms) {
          termsError.textContent =
            "BбєЎn phбєЈi Д‘б»“ng ГЅ vб»›i Д‘iб»Ѓu khoбєЈn Д‘б»ѓ tiбєїp tб»Ґc.";
          isValid = false;
        }

        if (isValid) {
          statusBox.className =
            "text-xs rounded-xl p-3 text-center font-bold bg-green-50 text-green-600 border border-green-100 block animate-pulse";
          statusBox.textContent =
            "ДђДѓng kГЅ thГ nh cГґng! Дђang chuyб»ѓn hЖ°б»›ng sang ДђДѓng nhбє­p...";

          setTimeout(() => {
            window.location.href = "./login.html";
          }, 2000);
        } else {
          statusBox.className =
            "text-xs rounded-xl p-3 text-center font-bold bg-red-50 text-red-500 border border-red-100 block";
          statusBox.textContent =
            "ДђДѓng kГЅ thбєҐt bбєЎi. Vui lГІng kiб»ѓm tra lбєЎi thГґng tin lб»—i.";
        }
      });
    </script>

    <script src="../index.js"></script>
    <script src="../main.js"></script>
  </body>
</html>
