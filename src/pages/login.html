<!DOCTYPE html>
<html lang="en">
  <head>
    <script>
      window.APP_ROOT = window.location.hostname.includes("github.io")
        ? "/web-todo/"
        : "/";
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <base href="/web-todo/" />
    <title>Login</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <div class="container min-vh-100 d-flex justify-content-center align-items-center">
      <div class="card border-0 shadow-lg rounded-4 p-4" style="width: 100%; max-width: 420px">
        <div class="card-body">
          <h2 class="text-center fw-bold mb-4">Login</h2>

          <form id="form-login" data-testId="login-form">
            <div class="mb-3">
              <label for="email" class="form-label fw-semibold"> Email </label>
              <input
                type="email"
                id="email"
                class="form-control form-control-lg rounded-3"
                placeholder="Enter your email"
              />
              <span id="emailError" class="text-danger small"></span>
            </div>

            <div class="mb-3">
              <label for="password" class="form-label fw-semibold"> Password </label>
              <input
                type="password"
                id="password"
                class="form-control form-control-lg rounded-3"
                placeholder="Enter your password"
              />
              <span id="passwordError" class="text-danger small"></span>
            </div>

            <div class="form-check mb-4">
              <input class="form-check-input" type="checkbox" id="remember" />
              <label class="form-check-label" for="remember"> Remember me </label>
            </div>

            <button
              type="submit"
              class="btn btn-dark btn-lg w-100 rounded-3"
              id="login-button"
              data-testId="login-submit"
            >
              Sign In
            </button>

            <div class="d-flex gap-3 mt-4">
              <div
                class="alert flex-fill rounded-3 mb-0"
                id="statusBox"
                style="display: none"
              ></div>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script type="module">
      import { LoginService } from "/src/services/login.service.js";
      import { UserService } from "/src/services/user.service.js";

      const formLogin = document.getElementById("form-login");
      const statusBox = document.getElementById("statusBox");
      const emailInput = document.getElementById("email");
      const passwordInput = document.getElementById("password");
      const emailError = document.getElementById("emailError");
      const passwordError = document.getElementById("passwordError");

      const userService = new UserService();
      const loginService = new LoginService(userService);

      // Helper syntax to reset errors uniformly when typing
      const clearErrors = () => {
        emailError.textContent = "";
        passwordError.textContent = "";
        statusBox.style.display = "none";
        statusBox.classList.remove("alert-success", "alert-danger");
      };

      emailInput.addEventListener("input", clearErrors);
      passwordInput.addEventListener("input", clearErrors);

      formLogin.addEventListener("submit", function (event) {
        event.preventDefault();

        const email = emailInput.value.trim();
        const password = passwordInput.value.trim();

        // Pass payload as an object
        const result = loginService.login({ email, password });

        // Clean slate on submit
        emailError.textContent = "";
        passwordError.textContent = "";
        statusBox.style.display = "none";
        statusBox.classList.remove("alert-success", "alert-danger");

        if (result.success) {
          statusBox.classList.add("alert-success");
          statusBox.innerHTML = `<strong>Success:</strong> ${result.message}`;
          statusBox.style.display = "block";
          return; 
        }

        // Handle failure
        statusBox.classList.add("alert-danger");
        statusBox.innerHTML = `<strong>Error:</strong> ${result.message}`;
        statusBox.style.display = "block";

        if (result.data) {
          emailError.textContent = result.data.email || "";
          passwordError.textContent = result.data.password || "";
        }
      });
    </script>
  </body>
</html>
