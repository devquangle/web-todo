
<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng Nhập - Fashion Shop</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../css/user.css" />
  </head>

  <body
    class="bg-slate-50 text-slate-800 flex flex-col min-h-screen font-['Inter']"
  >
    <!-- Navbar -->
    <nav
      id="navbar-placeholder"
      class="bg-slate-900/95 text-white sticky top-0 z-50 backdrop-blur-md border-b border-slate-800 shadow-lg"
    >
      <!-- Load bằng main.js -->
    </nav>

    <!-- Login Container -->
    <div
      class="container min-h-screen flex justify-center items-center px-4 py-12 mx-auto"
    >
      <div
        class="w-full max-w-md bg-white rounded-3xl border border-slate-200/60 shadow-xl overflow-hidden p-6 sm:p-8 space-y-6"
      >
        <!-- Logo -->
        <div class="text-center space-y-2">
          <a
            href="../../index.html"
            class="text-2xl font-black tracking-wider text-amber-500 inline-block"
          >
            👟 FASHION SHOP
          </a>

          <h2
            class="text-xl sm:text-2xl font-extrabold text-slate-900 tracking-tight"
          >
            Đăng Nhập Tài Khoản
          </h2>

          <p class="text-xs text-slate-500">
            Chào mừng bạn quay trở lại
          </p>
        </div>

        <!-- Form Login -->
        <form id="form-login" class="space-y-4">
          <!-- Email -->
          <div>
            <label
              for="email"
              class="block text-[10px] font-bold text-slate-400 uppercase mb-1.5"
            >
              Email
            </label>

            <input
              type="email"
              id="email"
                autocomplete="email"
              placeholder="name@example.com"
              class="w-full bg-slate-50 border border-slate-200 text-xs text-slate-800 rounded-xl px-4 py-3 focus:outline-none focus:bg-white focus:border-amber-400 transition"
            />

            <span
              id="emailError"
              class="text-[10px] text-red-500 mt-1 block font-medium"
            ></span>
          </div>

          <!-- Password -->
          <div>
            <label
              for="password"
              class="block text-[10px] font-bold text-slate-400 uppercase mb-1.5"
            >
              Mật khẩu
            </label>

            <input
              type="password"
              id="password"
                autocomplete="current-password"
              placeholder="Nhập mật khẩu của bạn"
              class="w-full bg-slate-50 border border-slate-200 text-xs text-slate-800 rounded-xl px-4 py-3 focus:outline-none focus:bg-white focus:border-amber-400 transition"
            />

            <span
              id="passwordError"
              class="text-[10px] text-red-500 mt-1 block font-medium"
            ></span>
          </div>

          <!-- Remember + Forgot -->
          <div class="flex items-center justify-between">
            <label
              class="flex items-center gap-2 text-xs text-slate-600 cursor-pointer"
            >
              <input
                type="checkbox"
                id="rememberMe"
                class="rounded border-slate-300 text-amber-500 focus:ring-amber-400"
              />
              Ghi nhớ đăng nhập
            </label>

            <a
              href="./forgot-password.html"
              class="text-xs font-medium text-amber-500 hover:text-amber-600 transition"
            >
              Quên mật khẩu?
            </a>
          </div>

          <!-- Login Button -->
          <button
            type="submit"
            id="login-button"
            data-testid="login-submit"
            class="w-full bg-slate-900 hover:bg-slate-800 text-white text-xs font-bold py-3.5 rounded-xl shadow-md hover:-translate-y-0.5 transition duration-300"
          >
            Đăng Nhập
          </button>

          <!-- Status Box -->
          <div
            id="statusBox"
            style="display:none"
            class="text-xs rounded-xl p-3 text-center font-bold"
          ></div>
        </form>

        <!-- Register Link -->
        <div
          class="text-center text-xs text-slate-500 border-t border-slate-100 pt-4"
        >
          Chưa có tài khoản?

          <a
            href="./register.html"
            class="text-amber-500 hover:text-amber-600 font-bold transition"
          >
            Đăng ký ngay
          </a>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div id="footer-placeholder"></div>

    <script type="module">
      import { LoginService } from "../services/login.service.js";
      import { UserService } from "../services/user.service.js";

      const formLogin = document.getElementById("form-login");
      const emailInput = document.getElementById("email");
      const passwordInput = document.getElementById("password");

      const emailError = document.getElementById("emailError");
      const passwordError = document.getElementById("passwordError");
      const statusBox = document.getElementById("statusBox");

      const userService = new UserService();
      const loginService = new LoginService(userService);

      function clearErrors() {
        emailError.textContent = "";
        passwordError.textContent = "";

        statusBox.textContent = "";
        statusBox.style.display = "none";

        statusBox.className =
          "text-xs rounded-xl p-3 text-center font-bold";
      }

      emailInput.addEventListener("input", clearErrors);
      passwordInput.addEventListener("input", clearErrors);

      formLogin.addEventListener("submit", (event) => {
        event.preventDefault();

        clearErrors();

        const email = emailInput.value.trim();
        const password = passwordInput.value.trim();

        const result = loginService.login({
          email,
          password,
        });

        if (result.success) {
          statusBox.className =
            "text-xs rounded-xl p-3 text-center font-bold bg-green-50 text-green-600 border border-green-200";

          statusBox.textContent = `Success: ${result.message}`;
          statusBox.style.display = "block";

          return;
        }

        statusBox.className =
          "text-xs rounded-xl p-3 text-center font-bold bg-red-50 text-red-600 border border-red-200";

        statusBox.textContent = `Error: ${result.message}`;
        statusBox.style.display = "block";

        if (result.data) {
          emailError.textContent = result.data.email || "";
          passwordError.textContent = result.data.password || "";
        }
      });
    </script>

    <script src="../index.js"></script>
    <script src="../main.js"></script>
  </body>
</html>
