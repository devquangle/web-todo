<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <base href="/web-todo/" />
    <title>Sản Phẩm - Fashion Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/user.css" />
  </head>
  <body
    class="bg-slate-50 text-slate-800 flex flex-col min-h-screen font-['Inter']"
  >
    <!-- Navbar Placeholder -->
    <nav
      id="navbar-placeholder"
      class="bg-slate-900/95 text-white sticky top-0 z-50 backdrop-blur-md border-b border-slate-800 shadow-lg"
    >
      <!-- Sẽ được tải động bằng main.js -->
    </nav>

    <main class="flex-grow">
      <!-- Products Hero Banner -->
      <section
        class="relative bg-slate-900 h-[260px] flex items-center justify-center bg-cover bg-center text-center px-4"
        style="
          background-image: url(&quot;https://images.unsplash.com/photo-1549298916-b41d501d3772?w=1920&quot;);
        "
      >
        <div class="absolute inset-0 bg-slate-950/75 backdrop-blur-[2px]"></div>
        <div class="relative z-10 max-w-2xl text-white">
          <span
            class="text-amber-400 text-[10px] sm:text-xs font-bold uppercase tracking-widest bg-amber-400/10 px-3 py-1 rounded-full border border-amber-400/20"
          >
            Collections 2026
          </span>
          <h1
            class="text-2xl sm:text-4xl font-extrabold tracking-tight mt-3 mb-2 uppercase"
          >
            🔥 TRENDING SNEAKERS
          </h1>
          <p class="text-xs sm:text-sm text-slate-300 max-w-md mx-auto">
            Sở hữu ngay những mẫu giày sneakers chất lượng cao, đón đầu xu thế
            thời trang đường phố toàn cầu.
          </p>
        </div>
      </section>

      <!-- Main Shop Section -->
      <section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        <!-- Filter and Search Bar -->
        <div
          class="bg-white rounded-2xl p-4 mb-8 border border-slate-200/60 shadow-sm flex flex-col md:flex-row justify-between items-center gap-4"
        >
          <div
            class="w-full md:w-auto flex items-center gap-2 flex-grow max-w-md"
          >
            <div class="relative w-full">
              <span
                class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400"
              >
                <i class="ri-search-line"></i>
              </span>
              <input
                id="search-input"
                type="text"
                placeholder="Tìm kiếm giày thể thao..."
                class="w-full bg-slate-50 border border-slate-200 text-xs rounded-xl pl-9 pr-4 py-2.5 focus:outline-none focus:bg-white focus:border-amber-400 transition"
              />
            </div>
          </div>

          <div
            class="w-full md:w-auto flex items-center gap-3 justify-end shrink-0"
          >
            <select
              id="filter-sort"
              class="text-xs bg-white border border-slate-200 rounded-xl px-3 py-2.5 text-slate-600 font-medium focus:outline-none focus:border-amber-400 transition"
            >
              <option value="newest">Mới nhất</option>
              <option value="price-asc">Giá: Thấp đến Cao</option>
              <option value="price-desc">Giá: Cao đến Thấp</option>
            </select>
          </div>
        </div>

        <!-- Product Grid List -->
        <div
          id="product-list"
          class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"
        >
          <!-- Các thẻ sản phẩm được kết xuất động bằng Javascript -->
        </div>
      </section>
    </main>

    <!-- Notification Toast -->
    <div
      id="cart-toast"
      class="fixed bottom-6 right-6 bg-slate-900 text-white rounded-2xl px-5 py-4 shadow-2xl border border-slate-800 z-55 transform translate-y-24 opacity-0 transition-all duration-300 pointer-events-none flex items-center gap-3"
    >
      <div
        class="w-8 h-8 rounded-full bg-amber-400 text-slate-950 flex items-center justify-center font-black"
      >
        <i class="ri-check-line text-lg"></i>
      </div>
      <div>
        <h4 class="text-xs font-bold">Đã thêm vào giỏ</h4>
        <p class="text-[10px] text-slate-400 mt-0.5" id="toast-msg">
          Sản phẩm đã có trong giỏ hàng của bạn.
        </p>
      </div>
    </div>

    <!-- Footer Placeholder -->
    <div id="footer-placeholder"></div>


    <script src="/src/index.js"></script>
    <script src="/src/main.js"></script>
    <!-- Product Logic Integration Script -->
    <script>
      const products = [
        {
          id: 1,
          name: "Nike Air Force 1",
          image:
            "https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=600",
          description: "Classic sneaker with modern comfort and style.",
          oldPrice: 2900000,
          variants: [
            {
              skuId: 101,
              quantity: 12,
              price: 2500000,
              color: "White",
              size: "39",
              skuCode: "NAF1-WH-39",
              status: true,
            },
            {
              skuId: 102,
              quantity: 8,
              price: 2500000,
              color: "Black",
              size: "40",
              skuCode: "NAF1-BL-40",
              status: true,
            },
          ],
        },

        {
          id: 2,
          name: "Adidas Ultraboost",
          image:
            "https://images.unsplash.com/photo-1525966222134-fcfa99b8ae77?w=600",
          description:
            "Responsive running shoes with stylish high performance.",
          oldPrice: 3600000,
          variants: [
            {
              skuId: 201,
              quantity: 15,
              price: 3200000,
              color: "Black",
              size: "41",
              skuCode: "AUB-BL-41",
              status: true,
            },
            {
              skuId: 202,
              quantity: 10,
              price: 3200000,
              color: "White",
              size: "42",
              skuCode: "AUB-WH-42",
              status: true,
            },
          ],
        },

        {
          id: 3,
          name: "Puma RS-X",
          image:
            "https://images.unsplash.com/photo-1600185365483-26d7a4cc7519?w=600",
          description: "Chunky sneakers with retro-inspired style and comfort.",
          oldPrice: 2400000,
          variants: [
            {
              skuId: 301,
              quantity: 6,
              price: 2100000,
              color: "Gray",
              size: "40",
              skuCode: "PRSX-GR-40",
              status: true,
            },
            {
              skuId: 302,
              quantity: 0,
              price: 2150000,
              color: "Blue",
              size: "41",
              skuCode: "PRSX-BL-41",
              status: false,
            },
          ],
        },

        {
          id: 4,
          name: "Jordan 1 Low",
          image:
            "https://images.unsplash.com/photo-1608231387042-66d1773070a5?w=600",
          description: "Streetwear icon styled with premium quality leather.",
          oldPrice: 3900000,
          variants: [
            {
              skuId: 401,
              quantity: 10,
              price: 3500000,
              color: "Red/Black",
              size: "41",
              skuCode: "J1L-RB-41",
              status: true,
            },
            {
              skuId: 402,
              quantity: 4,
              price: 3550000,
              color: "White/Grey",
              size: "42",
              skuCode: "J1L-WG-42",
              status: true,
            },
          ],
        },
      ];

      const productList = document.getElementById("product-list");
      const searchInput = document.getElementById("search-input");
      const sortSelect = document.getElementById("filter-sort");

      // State lưu trữ danh sách sản phẩm yêu thích (like toggle)
      const favorites = new Set();

      function formatPrice(price) {
        return price.toLocaleString("vi-VN") + " đ";
      }

      function toggleFavorite(btn, name) {
        const icon = btn.querySelector("i");
        if (icon.classList.contains("ri-heart-line")) {
          icon.className = "ri-heart-fill text-red-500 animate-pulse";
          favorites.add(name);
          showToast(
            "Đã lưu yêu thích",
            "Đã thêm " + name + " vào danh sách wishlist.",
          );
        } else {
          icon.className = "ri-heart-line text-slate-500";
          favorites.delete(name);
        }
      }

      function showToast(title, msg) {
        const toast = document.getElementById("cart-toast");
        const msgEl = document.getElementById("toast-msg");
        msgEl.textContent = msg;
        toast.querySelector("h4").textContent = title;
        toast.classList.remove("translate-y-24", "opacity-0");

        setTimeout(() => {
          toast.classList.add("translate-y-24", "opacity-0");
        }, 3000);
      }

      function renderProducts(data = products) {
        if (data.length === 0) {
          productList.innerHTML = `
            <div class="col-span-full text-center py-16 bg-white border border-slate-100 rounded-2xl">
              <span class="text-4xl"><i class="ri-search-eye-line text-slate-300"></i></span>
              <h3 class="text-sm font-bold text-slate-700 mt-3">Không tìm thấy sản phẩm</h3>
              <p class="text-xs text-slate-400 mt-1">Vui lòng thử tìm kiếm với từ khóa khác.</p>
            </div>
          `;
          return;
        }

        productList.innerHTML = data
          .map((product) => {
            const firstVariant = product.variants[0];
            const hasSale =
              product.oldPrice && product.oldPrice > firstVariant.price;

            return `
              <div class="bg-white rounded-2xl overflow-hidden border border-slate-100 shadow-sm hover:shadow-xl transition group duration-300 flex flex-col">
                <!-- Thumbnail -->
                <div class="relative overflow-hidden bg-slate-100 aspect-[4/3] shrink-0">
                  ${
                    hasSale
                      ? `
                    <span class="absolute top-3 left-3 bg-red-500 text-white text-[9px] font-bold tracking-wider uppercase px-2 py-0.5 rounded-md z-10">
                      Sale
                    </span>
                  `
                      : ""
                  }
                  <img
                    src="${product.image}"
                    class="object-cover w-full h-full group-hover:scale-105 transition duration-500"
                    alt="${product.name}"
                  />
                  <button onclick="toggleFavorite(this, '${product.name}')" class="absolute top-3 right-3 w-8 h-8 rounded-full bg-white/90 backdrop-blur-sm shadow-md hover:bg-white flex items-center justify-center transition border border-slate-100">
                    <i class="ri-heart-line text-slate-500 text-base"></i>
                  </button>
                </div>

                <!-- Card Body -->
                <div class="p-4 flex flex-col flex-grow">
                  <span class="text-[10px] text-amber-500 font-bold uppercase tracking-wider mb-1">Giày Sneakers</span>
                  <h3 class="text-xs sm:text-sm font-bold text-slate-800 line-clamp-1 group-hover:text-amber-500 transition">
                    ${product.name}
                  </h3>
                  <p class="text-[11px] text-slate-400 line-clamp-2 mt-1 min-h-[32px] leading-relaxed">
                    ${product.description}
                  </p>

                  <div class="flex items-baseline gap-2 mt-3 mb-4">
                    <span class="text-sm sm:text-base font-black text-red-500">
                      ${formatPrice(firstVariant.price)}
                    </span>
                    ${
                      hasSale
                        ? `
                      <span class="text-[10px] sm:text-xs text-slate-400 line-through">
                        ${formatPrice(product.oldPrice)}
                      </span>
                    `
                        : ""
                    }
                  </div>

                  <!-- Variants Section -->
                  <div class="bg-slate-50 rounded-xl p-2.5 space-y-1.5 border border-slate-100 mb-4 mt-auto">
                    ${product.variants
                      .map((variant) => {
                        const statusClass = variant.status
                          ? "text-green-600 font-bold"
                          : "text-red-500 font-bold";
                        const statusText = variant.status
                          ? `Còn ${variant.quantity}`
                          : "Hết hàng";

                        return `
                          <div class="flex justify-between items-center text-[10px] font-medium text-slate-500">
                            <span>🎨 ${variant.color} | 📏 ${variant.size}</span>
                            <span class="${statusClass}">${statusText}</span>
                          </div>
                        `;
                      })
                      .join("")}
                  </div>

                  <button onclick="showToast('Đã thêm vào giỏ', 'Sản phẩm ${product.name} đã được thêm vào giỏ hàng của bạn.')" class="w-full bg-slate-900 hover:bg-slate-800 text-white text-xs font-bold py-2.5 rounded-xl transition flex items-center justify-center gap-1.5 shadow-md">
                    <i class="ri-shopping-cart-2-line"></i> Thêm vào giỏ
                  </button>
                </div>
              </div>
            `;
          })
          .join("");
      }

      function handleSearchAndFilter() {
        const query = searchInput.value.toLowerCase().trim();
        const sort = sortSelect.value;

        // Tìm kiếm
        let filtered = products.filter(
          (p) =>
            p.name.toLowerCase().includes(query) ||
            p.description.toLowerCase().includes(query),
        );

        // Sắp xếp
        if (sort === "price-asc") {
          filtered.sort((a, b) => a.variants[0].price - b.variants[0].price);
        } else if (sort === "price-desc") {
          filtered.sort((a, b) => b.variants[0].price - a.variants[0].price);
        }

        renderProducts(filtered);
      }

      searchInput.addEventListener("input", handleSearchAndFilter);
      sortSelect.addEventListener("change", handleSearchAndFilter);

      // Render lần đầu tiên
      renderProducts();
    </script>
  </body>
</html>
