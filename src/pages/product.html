<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shoe Store</title>

    <!-- Bootstrap 5 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <style>
      body {
        background: #f5f7fb;
        font-family: Arial, sans-serif;
      }

      .section-title {
        font-size: 2rem;
        font-weight: bold;
        margin-bottom: 30px;
      }

      .product-card {
        border: none;
        border-radius: 22px;
        overflow: hidden;
        transition: all 0.3s ease;
        background: white;
      }

      .product-card:hover {
        transform: translateY(-8px);
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
      }

      .product-img-wrapper {
        position: relative;
        overflow: hidden;
      }

      .product-img {
        height: 260px;
        object-fit: cover;
        transition: 0.4s;
      }

      .product-card:hover .product-img {
        transform: scale(1.05);
      }

      .favorite-btn {
        position: absolute;
        top: 12px;
        right: 12px;
        width: 42px;
        height: 42px;
        border-radius: 50%;
        border: none;
        background: white;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.12);
      }

      .favorite-btn:hover {
        background: #ffe5e5;
        color: red;
      }

      .badge-sale {
        position: absolute;
        top: 12px;
        left: 12px;
        background: #dc3545;
        color: white;
        padding: 6px 12px;
        border-radius: 50px;
        font-size: 0.8rem;
        font-weight: bold;
      }

      .card-title {
        font-size: 1.1rem;
      }

      .description {
        font-size: 0.92rem;
        color: #6c757d;
        height: 45px;
      }

      .price {
        color: #dc3545;
        font-size: 1.4rem;
        font-weight: bold;
      }

      .old-price {
        text-decoration: line-through;
        color: gray;
        font-size: 0.95rem;
      }

      .variant-box {
        background: #f8f9fa;
        border-radius: 12px;
        padding: 10px;
        margin-bottom: 14px;
      }

      .variant-item {
        font-size: 0.85rem;
        margin-bottom: 4px;
      }

      .stock {
        color: #198754;
        font-weight: 600;
      }

      .out-stock {
        color: #dc3545;
        font-weight: 600;
      }

      .add-cart-btn {
        border-radius: 14px;
        font-weight: 600;
        padding: 10px;
      }
    </style>
  </head>

  <body>
    <div class="container py-5">
      <h2 class="section-title text-center">🔥 Trending Sneakers</h2>

      <div class="row g-4" id="product-list"></div>
    </div>

    <script>
      const products = [
        {
          id: 1,
          name: "Nike Air Force 1",
          image:
            "https://images.unsplash.com/photo-1542291026-7eec264c27ff",
          description: "Classic sneaker with modern comfort.",
          oldPrice: 2900000,
          variants: [
            {
              skuId: 101,
              quantity: 12,
              price: 2500000,
              color: "White",
              size: "39",
              skuCode: "NAF1-WH-39",
              status: true,
            },
            {
              skuId: 102,
              quantity: 8,
              price: 2500000,
              color: "Black",
              size: "40",
              skuCode: "NAF1-BL-40",
              status: true,
            },
          ],
        },

        {
          id: 2,
          name: "Adidas Ultraboost",
          image:
            "https://images.unsplash.com/photo-1525966222134-fcfa99b8ae77",
          description: "Responsive running shoes with stylish design.",
          oldPrice: 3600000,
          variants: [
            {
              skuId: 201,
              quantity: 15,
              price: 3200000,
              color: "Black",
              size: "41",
              skuCode: "AUB-BL-41",
              status: true,
            },
            {
              skuId: 202,
              quantity: 10,
              price: 3200000,
              color: "White",
              size: "42",
              skuCode: "AUB-WH-42",
              status: true,
            },
          ],
        },

        {
          id: 3,
          name: "Puma RS-X",
          image:
            "https://images.unsplash.com/photo-1600185365483-26d7a4cc7519",
          description: "Chunky sneakers with retro-inspired style.",
          oldPrice: 2400000,
          variants: [
            {
              skuId: 301,
              quantity: 6,
              price: 2100000,
              color: "Gray",
              size: "40",
              skuCode: "PRSX-GR-40",
              status: true,
            },
            {
              skuId: 302,
              quantity: 0,
              price: 2150000,
              color: "Blue",
              size: "41",
              skuCode: "PRSX-BL-41",
              status: false,
            },
          ],
        },

        {
          id: 4,
          name: "Jordan 1 Low",
          image:
            "https://images.unsplash.com/photo-1608231387042-66d1773070a5",
          description: "Streetwear icon with premium leather.",
          oldPrice: 3900000,
          variants: [
            {
              skuId: 401,
              quantity: 10,
              price: 3500000,
              color: "Red/Black",
              size: "41",
              skuCode: "J1L-RB-41",
              status: true,
            },
            {
              skuId: 402,
              quantity: 4,
              price: 3550000,
              color: "White/Grey",
              size: "42",
              skuCode: "J1L-WG-42",
              status: true,
            },
          ],
        },
      ];

      const productList = document.getElementById("product-list");

      function formatPrice(price) {
        return price.toLocaleString("vi-VN") + "đ";
      }

      function renderProducts() {
        productList.innerHTML = products
          .map((product) => {
            const firstVariant = product.variants[0];

            return `
              <div class="col-lg-3 col-md-6">
                <div class="card product-card shadow-sm h-100">

                  <div class="product-img-wrapper">
                    <span class="badge-sale">SALE</span>

                    <img
                      src="${product.image}"
                      class="card-img-top product-img"
                      alt="${product.name}"
                    />

                    <button class="favorite-btn">
                      <i class="bi bi-heart"></i>
                    </button>
                  </div>

                  <div class="card-body d-flex flex-column">

                    <h5 class="card-title fw-bold">
                      ${product.name}
                    </h5>

                    <p class="description">
                      ${product.description}
                    </p>

                    <div class="d-flex align-items-center gap-2 mb-3">
                      <span class="price">
                        ${formatPrice(firstVariant.price)}
                      </span>

                      <span class="old-price">
                        ${formatPrice(product.oldPrice)}
                      </span>
                    </div>

                    <div class="variant-box">
                      ${product.variants
                        .map(
                          (variant) => `
                        <div class="variant-item d-flex justify-content-between">
                          <span>
                            🎨 ${variant.color} | 📏 ${variant.size}
                          </span>

                          <span class="${
                            variant.status ? "stock" : "out-stock"
                          }">
                            ${
                              variant.status
                                ? `Còn ${variant.quantity}`
                                : "Hết hàng"
                            }
                          </span>
                        </div>
                      `
                        )
                        .join("")}
                    </div>

                    <button class="btn btn-dark w-100 add-cart-btn mt-auto">
                      <i class="bi bi-cart-plus"></i>
                      Thêm vào giỏ hàng
                    </button>
                  </div>
                </div>
              </div>
            `;
          })
          .join("");
      }

      renderProducts();
    </script>
  </body>
</html>
