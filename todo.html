<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <title>Danh sách việc cần làm</title>
    <style>
      body {
        background-color: #f8f9fa;
      }
      .todo-container {
        max-width: 800px;
        margin: 50px auto;
        background: #ffffff;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
      }
      /* Custom lại một chút cho checkbox đẹp hơn */
      .form-check-input:checked + .task-text {
        text-decoration: line-through;
        color: #6c757d;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="todo-container">
        <h2 class="text-center mb-4 text-primary fw-bold">
          📝 DANH SÁCH VIỆC CẦN LÀM
        </h2>

        <section class="mb-5">
          <form onsubmit="add(event)">
            <div class="row g-3 align-items-end">
              <div class="col-md-9">
                <label for="taskName" class="form-label fw-semibold"
                  >Tên công việc:</label
                >
                <input
                  type="text"
                  class="form-control"
                  id="taskName"
                  placeholder="Nhập tên công việc..."
                  name="taskName"
                  required
                />
              </div>

              <div class="col-md-3">
                <button type="submit" class="btn btn-primary w-100 fw-bold">
                  lưu
                </button>
              </div>
            </div>
          </form>
        </section>

        <hr class="text-muted my-4" />

        <section>
          <h5 class="mb-3 text-secondary fw-semibold">Công việc hiện tại</h5>
          <div class="table-responsive">
            <table class="table table-hover align-middle">
              <thead class="table-light">
                <tr>
                  <th scope="col" style="width: 10%">STT</th>
                  <th scope="col" style="width: 50%">Tên công việc</th>
                  <th scope="col" style="width: 15%" class="text-center">
                    Trạng thái
                  </th>
                  <th scope="col" style="width: 25%" class="text-center">
                    Hành động
                  </th>
                </tr>
              </thead>
              <tbody id="todo-list"></tbody>
            </table>
          </div>
        </section>
      </div>
    </div>
    <script>
      async function loadTodos() {
        try {
          const resp = await fetch("http://localhost:3000/todos");
          const todoListContainer = document.getElementById("todo-list");

          todoListContainer.innerHTML = "";

          if (!resp.ok) {
            todoListContainer.innerHTML = `<tr><td colspan="4" class="text-center text-danger">Có lỗi xảy ra từ máy chủ! ❌</td></tr>`;
            return;
          }

          // 2. Đổi tên biến hứng dữ liệu cho đồng bộ
          const data = await resp.json();

          if (data.length === 0) {
            todoListContainer.innerHTML = `<tr><td colspan="4" class="text-center text-muted">Chưa có công việc nào cần làm! 🎉</td></tr>`;
            return;
          }

          // 3. Sử dụng đúng biến `data` đã khai báo ở trên để lặp
          data.forEach((todo, index) => {
            const isChecked = todo.completed ? "checked" : "";
            const textClass = todo.completed
              ? "text-muted text-decoration-line-through"
              : "";

            const row = `
              <tr>
                <td>${index + 1}</td>
                <td class="fw-semibold task-text ${textClass}">${todo?.title}</td>
                <td class="text-center">
                  <div class="form-check d-flex justify-content-center">
                    <input
                      class="form-check-input"
                      type="checkbox"
                      ${isChecked}
                      onchange="toggleStatus('${todo?.id}', ${todo?.completed})"
                    />
                  </div>
                </td>
                <td class="text-center">
                  <button class="btn btn-sm btn-outline-warning me-1 fw-medium" onclick="editTodo('${todo?.id}', '${todo.title}')">
                    ✏️ Sửa
                  </button>
                  <button id="delete-btn${todo?.id}" class="btn btn-sm btn-outline-danger fw-medium" onclick="deleteTodo('${todo?.id}')">
                    🗑️ Xóa
                  </button>
                </td>
              </tr>
            `;
            todoListContainer.insertAdjacentHTML("beforeend", row);
          });
          data.forEach(async (job) => {
            const btnDelte = document.getElementById(`delete-btn${job.id}`);

            if (btnDelte) {
              btnDelte.addEventListener("click", async () => {
                const confirmed = confirm(
                  "Bạn có chắn chắn muốn xoá không? 🤨",
                );
                if (!confirmed) return;

                try {
                  const resp = await fetch(
                    `http://localhost:3000/todos/${job.id}`,
                    {
                      method: "DELETE",
                    },
                  );

                  if (resp.ok) {
                    await loadTodos();
                  } else {
                    alert("Xóa thất bại từ máy chủ! ❌");
                  }
                } catch (err) {
                  console.error("Lỗi khi xóa:", err);
                }
              });
            }
          }
        );
        } catch (error) {
          console.error("Lỗi mạng/kết nối:", error);
          document.getElementById("todo-list").innerHTML =
            `<tr><td colspan="4" class="text-center text-danger">⚠️ Lỗi kết nối đến Server Local (JSON Server)!</td></tr>`;
        }
      }

      async function add(event) {
        event.preventDefault();

        const taskInput = document.getElementById("taskName");
        const title = taskInput.value.trim();
        if (!title) return;

        const newTodo = {
          title: title,
          completed: false,
        };

        try {
          const resp = await fetch("http://localhost:3000/todos", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(newTodo),
          });

          if (resp.ok) {
            taskInput.value = "";

            await loadTodos();
          } else {
            alert("Không thể thêm công việc mới. Có lỗi từ server! ❌");
          }
        } catch (error) {
          console.error("Lỗi khi thêm công việc:", error);
          alert("Không thể kết nối đến server! ⚠️");
        }
      }
      async function deleteTodo(id) {
        const resp = await fetch("");
      }

      document.addEventListener("DOMContentLoaded", loadTodos);
    </script>
  </body>
</html>
