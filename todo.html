<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <title>Danh sách việc cần làm</title>
    <style>
      body {
        background-color: #f8f9fa;
      }
      .todo-container {
        max-width: 800px;
        margin: 50px auto;
        background: #ffffff;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
      }
      .form-check-input:checked + .task-text {
        text-decoration: line-through;
        color: #6c757d;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="todo-container">
        <h2 class="text-center mb-4 text-primary fw-bold">
          📝 DANH SÁCH VIỆC CẦN LÀM
        </h2>

        <section>
          <form id="todo-form">
            <div class="row g-3 align-items-end">
              <div class="col-md-8">
                <input type="hidden" id="taskId" value="" name="taskId" />
                <label for="taskName" class="form-label fw-semibold"
                  >Tên công việc:</label
                >
                <input
                  type="text"
                  class="form-control form-control-lg fs-6"
                  id="taskName"
                  placeholder="Nhập tên công việc..."
                  name="taskName"
                />
              </div>

              <div class="col-md-4">
                <div class="d-flex gap-2">
                  <button
                    type="submit"
                    id="btn-submit-todo"
                    class="btn btn-primary btn-lg fs-6 w-100 fw-bold text-nowrap"
                  >
                    💾 Lưu
                  </button>
                  <button
                    type="reset"
                    id="btn-reset-todo"
                    class="btn btn-outline-secondary btn-lg fs-6 w-100 fw-bold text-nowrap"
                  >
                    🔄 Reset
                  </button>
                </div>
              </div>
              <span id="errorTaskName" class="col-12 m-0 text-danger py-1">
              </span>
            </div>
          </form>
        </section>

        <hr class="text-muted mb-4" />

        <section>
          <h5 class="mb-3 text-secondary fw-semibold">Công việc hiện tại</h5>
          <div class="table-responsive">
            <table class="table table-hover align-middle">
              <thead class="table-light">
                <tr>
                  <th scope="col" style="width: 10%">STT</th>
                  <th scope="col" style="width: 50%">Tên công việc</th>
                  <th scope="col" style="width: 15%" class="text-center">
                    Trạng thái
                  </th>
                  <th scope="col" style="width: 25%" class="text-center">
                    Hành động
                  </th>
                </tr>
              </thead>
              <tbody id="todo-list"></tbody>
            </table>
          </div>
        </section>
      </div>
    </div>

    <div
      class="modal fade"
      id="ModalDeleteTodo"
      data-bs-backdrop="static"
      tabindex="-1"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header bg-danger text-white">
            <h5 class="modal-title fw-bold">⚠️ Xác nhận xóa</h5>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body fs-5">
            Bạn có chắc chắn muốn xóa công việc:
            <div id="delete-task-title" class="fw-bold my-2 text-danger"></div>
            <small class="text-muted fs-6"
              >Hành động này không thể hoàn tác.</small
            >
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary fw-medium"
              data-bs-dismiss="modal"
            >
              Hủy bỏ
            </button>
            <button
              type="button"
              id="confirm-delete-btn"
              class="btn btn-danger fw-bold"
            >
              🗑️ Đồng ý Xóa
            </button>
          </div>
        </div>
      </div>
    </div>

    <script type="module">
      import TodoService from "./src/services/todo.service.js";

      /** @type {TodoService} */
      const todoService = new TodoService();
      const todoForm = document.getElementById("todo-form");
      const taskId = document.getElementById("taskId");
      const taskName = document.getElementById("taskName");
      const errorTaskName = document.getElementById("errorTaskName");
      const btnDeleteTodo = document.getElementById("confirm-delete-btn");
      const btnSaveTodo = document.getElementById("btn-submit-todo");

      let todoIdToDelete = null;
      const bootstrapModal = new bootstrap.Modal(
        document.getElementById("ModalDeleteTodo"),
      );

      // 1. Hàm hiển thị danh sách công việc
      async function loadTodos() {
        const todoListContainer = document.getElementById("todo-list");
        todoListContainer.innerHTML = "";
        try {
          const data = await todoService.fetchData();

          if (!data || data.length === 0) {
            todoListContainer.innerHTML = `<tr><td colspan="4" class="text-center text-muted">Chưa có công việc nào cần làm! 🎉</td></tr>`;
            return;
          }

          data.forEach((todo, index) => {
            const isChecked = todo.completed ? "checked" : "";
            const textClass = todo.completed
              ? "text-muted text-decoration-line-through"
              : "";
            const encodedTodo = btoa(encodeURIComponent(JSON.stringify(todo)));

            const row = `
            <tr>
              <td>${index + 1}</td>
              <td class="fw-semibold task-text ${textClass}">${todo?.title}</td>
              <td class="text-center">
                 <div class="d-flex justify-content-center align-items-center gap-2">
                      <input
                        class="form-check-input"
                        type="checkbox"
                        ${isChecked}
                        onchange="toggleStatus('${todo?.id}', ${todo?.completed})"
                      />

                      <span id="status" class="badge ${
                        todo?.completed ? "bg-success" : "bg-warning text-dark"
                      }">
                        ${todo?.completed ? "Completed" : "Pending"}
                      </span>
                  </div>
              </td>
              <td class="text-center">
                <button class="btn btn-sm btn-outline-warning me-1 fw-medium" onclick="prepareEditTodo('${encodedTodo}')">
                  ✏️ Sửa
                </button>
                <button class="btn btn-sm btn-outline-danger fw-medium" onclick="prepareDeleteTodo('${encodedTodo}')">
                  🗑️ Xóa
                </button>
              </td>
            </tr>
          `;
            todoListContainer.insertAdjacentHTML("beforeend", row);
          });
        } catch (error) {
          console.error("Lỗi hiển thị danh sách:", error);
          todoListContainer.innerHTML = `<tr><td colspan="4" class="text-center text-danger">Có lỗi xảy ra từ máy chủ! ❌</td></tr>`;
        }
      }

      // 2. Xử lý sự kiện gửi Form (Thêm mới hoặc Cập nhật)
      todoForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        errorTaskName.textContent = "";
        const id = taskId.value;
        const title = taskName.value.trim();

        try {
          if (id) {
            const oldTodo = await todoService.edit(id);
            const updatedTodo = { ...oldTodo, title: title };
            await todoService.update(id, updatedTodo);
          } else {
            const newTodo = { title: title, completed: false };
            await todoService.add(newTodo);
          }

          resetFormState();
          await loadTodos();
        } catch (error) {
          console.error("Lỗi xử lý Form:", error);
          errorTaskName.textContent = error.message;
        }
      });

      // 3. Hàm thay đổi trạng thái Checkbox toàn cục
      window.toggleStatus = async (id, currentStatus) => {
        try {
          const oldTodo = await todoService.edit(id);
          if (oldTodo) {
            oldTodo.completed = !currentStatus;
            await todoService.update(id, oldTodo);
            await loadTodos();
          }
        } catch (error) {
          console.error("Lỗi cập nhật trạng thái:", error);
        }
      };

      // 4. Hàm chuẩn bị xóa (Mở Modal)
      window.prepareDeleteTodo = (encodedTodo) => {
        try {
          const todo = JSON.parse(decodeURIComponent(atob(encodedTodo)));
          todoIdToDelete = todo.id;

          const taskTitleElement = document.getElementById("delete-task-title");
          if (taskTitleElement) {
            taskTitleElement.textContent = `"${todo.title}"`;
          }

          bootstrapModal.show();
        } catch (error) {
          console.error("Lỗi giải mã dữ liệu Todo:", error);
        }
      };

      // 5. Hàm chuẩn bị sửa (Đổ dữ liệu lên Form)
      window.prepareEditTodo = (encodedTodo) => {
        try {
          const todo = JSON.parse(decodeURIComponent(atob(encodedTodo)));

          taskId.value = todo.id;
          taskName.value = todo.title;
          btnSaveTodo.textContent = "🚀 Cập nhật"; // Thêm icon cập nhật động
          btnSaveTodo.className =
            "btn btn-warning btn-lg fs-6 w-100 fw-bold text-nowrap";
          taskName.focus();
        } catch (error) {
          console.error("Lỗi giải mã dữ liệu Todo:", error);
          alert("Có lỗi xảy ra khi cập nhật công việc! ❌");
        }
      };

      // 6. Xử lý sự kiện click nút "Đồng ý Xóa" trong Modal
      btnDeleteTodo.addEventListener("click", async () => {
        if (!todoIdToDelete) return;

        try {
          await todoService.delete(todoIdToDelete);
          bootstrapModal.hide();
          todoIdToDelete = null;
          await loadTodos();
        } catch (error) {
          alert("Xóa công việc thất bại! ❌");
        }
      });

      // 7. Lắng nghe sự kiện bấm nút Reset của form
      todoForm.addEventListener("reset", () => {
        setTimeout(resetFormState, 10);
      });


      function resetFormState() {
        taskId.value = "";
        taskName.value = "";
        errorTaskName.textContent = "";
        btnSaveTodo.textContent = "💾 Lưu"; 
        btnSaveTodo.className =
          "btn btn-primary btn-lg fs-6 w-100 fw-bold text-nowrap";
      }

      // Khởi chạy lần đầu tiên
      document.addEventListener("DOMContentLoaded", loadTodos);
    </script>
  </body>
</html>
