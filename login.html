<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Login</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <div
      class="container min-vh-100 d-flex justify-content-center align-items-center"
    >
      <div
        class="card border-0 shadow-lg rounded-4 p-4"
        style="width: 100%; max-width: 420px"
      >
        <div class="card-body">
          <h2 class="text-center fw-bold mb-4">Login</h2>

          <form
            id="form_login"
            data-testId="login-form"
            method="POST"
            action="/login"
          >
            <!-- Email -->
            <div class="mb-3">
              <label for="email" class="form-label fw-semibold"> Email </label>

              <input
                type="email"
                id="email"
                class="form-control form-control-lg rounded-3"
                placeholder="Enter your email"
              />
              <span id="emailError" class="text-danger small"></span>
            </div>

            <!-- Password -->
            <div class="mb-3">
              <label for="password" class="form-label fw-semibold">
                Password
              </label>

              <input
                type="password"
                id="password"
                class="form-control form-control-lg rounded-3"
                placeholder="Enter your password"
              />
              <span id="passwordError" class="text-danger small"></span>
            </div>

            <!-- Remember -->
            <div class="form-check mb-4">
              <input class="form-check-input" type="checkbox" id="remember" />

              <label class="form-check-label" for="remember">
                Remember me
              </label>
            </div>

            <!-- Button -->
            <button
              type="submit"
              class="btn btn-dark btn-lg w-100 rounded-3"
              id="loginBtn"
              data-testId="login-submit"
            >
              Sign In
            </button>

            <!-- Message Box -->
            <div class="d-flex gap-3 mt-4">
              <!-- Error -->
              <div
                class="alert alert-danger flex-fill rounded-3 mb-0"
                id="errorLoginFailed"
                style="display: none"
              >
                <strong>Error:</strong>
                Invalid email or password
              </div>

              <!-- Status -->
              <div
                class="alert alert-success flex-fill rounded-3 mb-0"
                id="statusBox"
                style="display: none"
              >
                <strong>Status:</strong>
                Connected
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </body>
  <script src="src/services/login.js"></script>
</html>
