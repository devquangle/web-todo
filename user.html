<!doctype html>
<html lang="vi">
  <head>
    <title>Danh sách người dùng</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="container mt-4">
      <h2>Danh sách người dùng</h2>

      <form id="fetch-data-form">
        <div class="mb-3">
          <label for="fetchApi" class="form-label">Đường dẫn API:</label>

          <input
            type="text"
            class="form-control"
            id="fetchApi"
            name="fetchApi"
            value="https://jsonplaceholder.typicode.com/users"
            placeholder="Nhập đường dẫn API"
          />
        </div>

        <button type="submit" class="btn btn-primary mb-4" id="fetch-data-btn">
          Lấy dữ liệu
        </button>
      </form>

      <div id="result" class="mt-3"></div>

      <table id="user-table" class="table table-hover mt-3">
        <thead>
          <tr>
            <th>Name</th>
            <th>Username</th>
            <th>Email</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <script type="module">
      import { UserService } from "./src/services/user.service.js";

      const userService = new UserService();
      const fetchDataForm = document.getElementById("fetch-data-form");
      const fetchButton = document.getElementById("fetch-data-btn");
      const resultDiv = document.getElementById("result"); // Dùng để hiện chữ "Đang tải..."

      // Lấy đúng phần tử tbody của bảng để đổ dữ liệu vào
      const userTableBody = document.querySelector("#user-table tbody");

      fetchDataForm.addEventListener("submit", async (event) => {
        event.preventDefault();

        const apiUrl = document.getElementById("fetchApi").value.trim();

        if (!apiUrl) {
          resultDiv.className = "alert alert-warning";
          resultDiv.textContent = "Vui lòng nhập đường dẫn API!";
          return;
        }

        // Trạng thái chờ
        resultDiv.className = "alert alert-info";
        resultDiv.textContent = "Đang tải dữ liệu...";
        userTableBody.innerHTML = ""; // Xóa dữ liệu cũ trong bảng khi bắt đầu tải mới
        fetchButton.disabled = true;
        fetchButton.textContent = "Đang tải...";

        try {
          // 1. Lấy chuỗi hàng HTML (các thẻ <tr><td>) từ Service
          const tableRowsHtml = await userService.loadData(apiUrl);

          // 2. Đổ thẳng chuỗi hàng này vào nội dung bên trong tbody
          userTableBody.innerHTML = tableRowsHtml;

          // 3. Xóa hoặc ẩn thông báo "Đang tải..." đi sau khi thành công
          resultDiv.className = "alert alert-success";
          resultDiv.textContent = "Load thành công.";
        } catch (criticalError) {
          console.error("Lỗi hệ thống:", criticalError);
          resultDiv.className = "alert alert-danger";
          resultDiv.textContent = "Đã xảy ra sự cố không mong muốn.";
          userTableBody.innerHTML = `<tr><td colspan="3" class="text-danger text-center">Sự cố hệ thống.</td></tr>`;
        } finally {
          // Mở khóa lại nút bấm
          fetchButton.disabled = false;
          fetchButton.textContent = "Lấy dữ liệu";
        }
      });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
